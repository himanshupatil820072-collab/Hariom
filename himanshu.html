<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plastic Gathi | Quality Plastic Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 80px;
        }

        /* --- Header & Branding --- */
        header {
            background: var(--primary);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: var(--shadow);
        }

        header h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }
        header p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.8; }

        .container { max-width: 600px; margin: -20px auto 0; padding: 0 15px; }

        /* --- Cards & UI Elements --- */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: var(--shadow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            text-decoration: none;
        }

        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Product Grid --- */
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1.2rem;
            border-radius: var(--radius);
            margin-bottom: 12px;
            transition: 0.3s;
            border-left: 5px solid transparent;
        }
        .product-item:hover { border-left: 5px solid var(--accent); }
        .product-info h3 { margin: 0; font-size: 1.2rem; }
        
        /* --- Contact Bar --- */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .contact-link {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 12px;
            text-decoration: none;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .contact-link i { display: block; font-size: 1.5rem; margin-bottom: 5px; color: var(--accent); }

        /* --- Bottom Navigation --- */
        nav.bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            border-top: 1px solid #eee;
            z-index: 1000;
        }
        .nav-item {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-align: center;
        }
        .nav-item i { display: block; font-size: 1.2rem; margin-bottom: 2px; }
        .nav-item.active { color: var(--accent); }

        /* --- Input Fields --- */
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            outline-color: var(--accent);
            font-family: inherit;
        }

        /* --- Views Management --- */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Alert Messages --- */
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .alert-success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid var(--success);
        }
        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid var(--danger);
        }

        /* --- Order History --- */
        .order-card {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }
        .order-card h4 { margin: 0 0 5px; }
        .order-card p { margin: 3px 0; font-size: 0.9rem; }

        .admin-logout { float: right; }
    </style>
</head>
<body>

<header>
    <h1>Plastic Gathi</h1>
    <p>Premium Plastic Raw Materials & Services</p>
</header>

<div class="container">
    
    <div class="contact-grid">
        <a href="mailto:himanshu820072@gmail.com" class="contact-link">
            <i class="fa-solid fa-envelope"></i> Email
        </a>
        <a href="tel:+918200720000" class="contact-link">
            <i class="fa-solid fa-phone"></i> Call
        </a>
    </div>

    <!-- HOME VIEW -->
    <div id="view-home" class="view active">
        <h2 style="font-size: 1.2rem; margin-bottom: 15px;">Available Products</h2>
        <div id="products-list"></div>
    </div>

    <!-- ORDER VIEW -->
    <div id="view-order" class="view card">
        <button class="btn btn-outline" style="width: auto; padding: 5px 15px; margin-bottom: 15px;" onclick="window.location.hash='home'">
            <i class="fa-solid fa-arrow-left"></i> Back
        </button>
        <h2 id="order-title">Place Order</h2>
        <p id="order-product-name" style="font-weight: 800; color: var(--accent); font-size: 1.4rem;"></p>
        
        <div id="order-alert"></div>

        <label>Your Name</label>
        <input type="text" id="order-name" placeholder="Enter your name">
        
        <label>Your Email</label>
        <input type="email" id="order-email" placeholder="Enter your email">
        
        <label>Your Phone</label>
        <input type="tel" id="order-phone" placeholder="Enter your phone number">
        
        <label>Quantity (Kilograms)</label>
        <input type="number" id="order-qty" placeholder="Enter kg (e.g. 50)" min="1">
        
        <label>Special Notes (Optional)</label>
        <textarea id="order-notes" placeholder="Any special requirements?" style="min-height:80px;"></textarea>
        
        <button id="btn-whatsapp-send" class="btn btn-whatsapp">
            <i class="fa-brands fa-whatsapp"></i> Order via WhatsApp
        </button>
        <button id="btn-email-send" class="btn btn-primary" style="margin-top: 10px;">
            <i class="fa-solid fa-envelope"></i> Send Order via Email
        </button>
    </div>

    <!-- PROFILE/ORDERS VIEW -->
    <div id="view-profile" class="view card">
        <h2>My Profile</h2>
        <div id="profile-content">
            <p>Please login to view your orders and profile.</p>
            <button class="btn btn-primary" onclick="window.location.hash='login'">Login / Register</button>
        </div>
    </div>

    <!-- LOGIN VIEW -->
    <div id="view-login" class="view card">
        <button class="btn btn-outline" style="width: auto; padding: 5px 15px; margin-bottom: 15px;" onclick="window.location.hash='home'">
            <i class="fa-solid fa-arrow-left"></i> Back
        </button>
        <h2>Login / Register</h2>
        <div id="login-alert"></div>
        
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com">
        
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password">
        
        <button class="btn btn-primary" id="btn-login">Login</button>
        <button class="btn btn-outline" id="btn-register" style="margin-top: 10px;">Create Account</button>
    </div>

    <!-- ADMIN DASHBOARD VIEW -->
    <div id="view-admin" class="view card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0;">Admin Dashboard</h2>
            <button class="btn btn-outline admin-logout" style="width: auto; padding: 8px 12px;" onclick="adminLogout()">
                <i class="fa-solid fa-sign-out-alt"></i> Logout
            </button>
        </div>
        
        <h3>Manage Products</h3>
        <label>Product Name</label>
        <input type="text" id="admin-product-name" placeholder="e.g., Rani Premium">
        
        <label>Price (₹/kg)</label>
        <input type="number" id="admin-product-price" placeholder="0" min="0">
        
        <button class="btn btn-primary" id="btn-add-product" style="margin-bottom: 20px;">
            <i class="fa-solid fa-plus"></i> Add Product
        </button>

        <h3>All Orders</h3>
        <div id="admin-orders-list">No orders yet</div>

        <h3>Contacts</h3>
        <div id="admin-contacts-list">No contacts saved</div>
    </div>

</div>

<nav class="bottom-nav">
    <a href="#home" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
    <a href="#profile" class="nav-item"><i class="fa-solid fa-box"></i>Orders</a>
    <a href="#profile" class="nav-item"><i class="fa-solid fa-user"></i>Profile</a>
</nav>

<script>
    // ===== CONFIGURATION =====
    const CONFIG = {
        email: "himanshu820072@gmail.com",
        phone: "+918200720000",
        whatsapp: "918200720000",
        adminPassword: "admin123" // Change this!
    };

    // ===== EMAILJS SETUP =====
    // Visit: https://www.emailjs.com
    // Get your Service ID, Template ID, and Public Key
    emailjs.init("YOUR_PUBLIC_KEY_HERE"); // Replace with your EmailJS public key

    // ===== LOCAL STORAGE HELPER =====
    const storage = {
        get(key) { return JSON.parse(localStorage.getItem(key)) || [] },
        set(key, val) { localStorage.setItem(key, JSON.stringify(val)) },
        remove(key) { localStorage.removeItem(key) }
    };

    // ===== INITIALIZE DEFAULT PRODUCTS =====
    if (storage.get('products').length === 0) {
        storage.set('products', [
            { id: 1, name: 'Rani (Premium)', price: 150 },
            { id: 2, name: 'SS Plastic', price: 120 },
            { id: 3, name: 'Kala Grade A', price: 100 }
        ]);
    }

    // ===== ROUTING LOGIC =====
    function handleRoute() {
        const hash = window.location.hash.replace('#', '') || 'home';
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

        if (hash === 'home') {
            document.getElementById('view-home').classList.add('active');
            document.querySelector('[href="#home"]').classList.add('active');
            renderProducts();
        } else if (hash.startsWith('order-')) {
            const id = hash.split('-')[1];
            setupOrderPage(id);
        } else if (hash === 'profile') {
            document.getElementById('view-profile').classList.add('active');
            document.querySelector('[href="#profile"]').classList.add('active');
            updateProfileView();
        } else if (hash === 'login') {
            document.getElementById('view-login').classList.add('active');
        } else if (hash === 'admin') {
            if (!isAdminLoggedIn()) {
                window.location.hash = 'login';
                return;
            }
            document.getElementById('view-admin').classList.add('active');
            loadAdminDashboard();
        }
    }

    // ===== RENDER PRODUCTS =====
    function renderProducts() {
        const list = document.getElementById('products-list');
        const products = storage.get('products');
        list.innerHTML = products.map(p => `
            <div class="product-item">
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <span style="color:var(--text-muted); font-size:0.9rem;">₹${p.price}/kg</span>
                </div>
                <button class="btn btn-primary" style="width:auto; padding: 10px 20px;" onclick="window.location.hash='order-${p.id}'">Order</button>
            </div>
        `).join('');
    }

    // ===== SETUP ORDER PAGE =====
    function setupOrderPage(id) {
        const products = storage.get('products');
        const product = products.find(p => p.id == id);
        if (!product) return;

        document.getElementById('view-order').classList.add('active');
        document.getElementById('order-product-name').innerText = product.name;
        document.getElementById('order-alert').innerHTML = '';

        // WhatsApp Order
        document.getElementById('btn-whatsapp-send').onclick = () => {
            const name = document.getElementById('order-name').value;
            const qty = document.getElementById('order-qty').value;
            const notes = document.getElementById('order-notes').value;

            if (!name || !qty) {
                showAlert('order-alert', 'Please fill in name and quantity', 'danger');
                return;
            }

            const message = `Hello Himanshu,\n\nProduct: ${product.name}\nQuantity: ${qty} kg\nCustomer Name: ${name}\n${notes ? 'Notes: ' + notes : ''}\n\nFrom: Plastic Gathi Web App`;
            window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(message)}`, '_blank');
            
            saveContact({ name, email: document.getElementById('order-email').value, phone: document.getElementById('order-phone').value });
            saveOrder({ product: product.name, qty, name, notes, date: new Date().toLocaleString() });
        };

        // Email Order
        document.getElementById('btn-email-send').onclick = () => {
            const name = document.getElementById('order-name').value;
            const email = document.getElementById('order-email').value;
            const phone = document.getElementById('order-phone').value;
            const qty = document.getElementById('order-qty').value;
            const notes = document.getElementById('order-notes').value;

            if (!name || !email || !qty) {
                showAlert('order-alert', 'Please fill in name, email and quantity', 'danger');
                return;
            }

            sendOrderEmail(product.name, name, email, phone, qty, notes);
        };
    }

    // ===== SEND ORDER EMAIL =====
    function sendOrderEmail(productName, customerName, customerEmail, customerPhone, qty, notes) {
        const btn = document.getElementById('btn-email-send');
        btn.disabled = true;
        btn.innerText = 'Sending...';

        const orderData = {
            to_email: CONFIG.email,
            customer_name: customerName,
            customer_email: customerEmail,
            customer_phone: customerPhone,
            product_name: productName,
            quantity: qty,
            special_notes: notes || 'None',
            order_date: new Date().toLocaleString()
        };

        // Send to admin
        emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", orderData)
            .then(() => {
                // Send confirmation to customer
                return emailjs.send("YOUR_SERVICE_ID", "YOUR_CUSTOMER_TEMPLATE_ID", {
                    to_email: customerEmail,
                    customer_name: customerName,
                    product_name: productName,
                    quantity: qty
                });
            })
            .then(() => {
                showAlert('order-alert', '✓ Order sent successfully! Check your email.', 'success');
                saveContact({ name: customerName, email: customerEmail, phone: customerPhone });
                saveOrder({ product: productName, qty, name: customerName, notes, date: new Date().toLocaleString() });
                
                // Clear form
                document.getElementById('order-name').value = '';
                document.getElementById('order-email').value = '';
                document.getElementById('order-phone').value = '';
                document.getElementById('order-qty').value = '';
                document.getElementById('order-notes').value = '';
                
                setTimeout(() => window.location.hash = 'home', 2000);
            })
            .catch(err => {
                showAlert('order-alert', '✗ Error sending order. Try WhatsApp instead.', 'danger');
                console.error(err);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = '📧 Send Order via Email';
            });
    }

    // ===== SAVE CONTACT =====
    function saveContact(contact) {
        const contacts = storage.get('contacts');
        const existing = contacts.findIndex(c => c.email === contact.email);
        if (existing >= 0) {
            contacts[existing] = contact;
        } else {
            contacts.push(contact);
        }
        storage.set('contacts', contacts);
    }

    // ===== SAVE ORDER =====
    function saveOrder(order) {
        const orders = storage.get('orders');
        orders.push(order);
        storage.set('orders', orders);
    }

    // ===== ADMIN LOGIN =====
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        if (email === CONFIG.email && password === CONFIG.adminPassword) {
            storage.set('adminLoggedIn', true);
            storage.set('adminEmail', email);
            window.location.hash = 'admin';
        } else {
            showAlert('login-alert', 'Invalid email or password', 'danger');
        }
    }

    function isAdminLoggedIn() {
        return storage.get('adminLoggedIn') === true;
    }

    function adminLogout() {
        storage.remove('adminLoggedIn');
        storage.remove('adminEmail');
        window.location.hash = 'home';
    }

    // ===== ADMIN DASHBOARD =====
    function loadAdminDashboard() {
        // Load orders
        const orders = storage.get('orders');
        const ordersList = document.getElementById('admin-orders-list');
        ordersList.innerHTML = orders.length ? orders.map(o => `
            <div class="order-card">
